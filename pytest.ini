# pytest.ini

[pytest]
# 测试路径配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*


# 标记定义
markers =
    smoke: 冒烟测试 - 核心功能快速验证
    regression: 回归测试 - 完整功能测试
    slow: 慢速测试 - 执行时间较长的测试
    ui: UI测试 - 界面相关测试
    api: API测试 - 接口相关测试
    integration: 集成测试
    p0: P0级别 - 最高优先级测试
    p1: P1级别 - 高优先级测试
    p2: P2级别 - 中优先级测试
    p3: P3级别 - 低优先级测试
    windows: Windows平台测试
    macos: macOS平台测试
    linux: Linux平台测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 超时配置
timeout = 300
timeout_method = thread

# 失败重试配置（需要 pytest-rerunfailures）
reruns = 2
reruns_delay = 1

# 并行执行配置（需要 pytest-xdist）
# 在命令行使用 -n auto 参数